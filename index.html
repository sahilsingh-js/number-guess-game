<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Guess Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Guess The Number and Win(Nothing)</h1>

<div class="input-group">
  <input 
  type="number" 
  id="guessInput" 
  placeholder="Enter number (1-10)" 
  min="1" 
  max="10"
/>
  <button id="guessBtn">Guess</button>
</div>

    <p id="message"></p>
    <p id="attempts"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
